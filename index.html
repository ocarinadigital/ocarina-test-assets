<!DOCTYPE html>
<!--
  INDEX.HTML — Escáner AR, Tipo 2 (Display AR), Ocarina Digital
  Punto de entrada único de la experiencia: inicializa la cámara MindAR,
  espera a detectar uno de los N trackers físicos, y redirige al D
  correspondiente. NO se edita pieza por pieza: cada museo nuevo parte de
  este archivo ajustando únicamente:
    - assets/logo.png (logo del museo, mostrado en la pantalla de carga)
    - El array DISPLAYS (cuántos trackers hay y a qué carpeta de D apunta cada uno)
    - El texto de "carga-txt" si se quiere personalizar el mensaje de carga
  La lógica de detección de cámara, el timing de la pantalla de carga, y el
  comportamiento de "volver al escáner" desde un D NO se modifican caso por caso.
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Display AR — Ocarina Digital</title>

  <!-- ===== LIBRERÍAS AR (no tocar) ===== -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }

    /* Pantalla de carga mientras inicializa la cámara. Paleta neutra por
       defecto (blanco/gris/dorado neutro) — si el museo pide un tinte de
       marca acá, se pisa #FFFFFF y #8A8A8A de abajo, nada más. */
    #pantalla-carga {
      position: fixed; inset: 0; background: #FFFFFF;
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      z-index: 999; overflow: hidden;
    }
    #pantalla-carga .corner { position:absolute; width:28px; height:28px; border-color:#8A8A8A; opacity:0.5; animation: breathe 2.8s ease-in-out infinite; }
    #pantalla-carga .corner.tl { top:32px; left:24px; border-top:2.5px solid; border-left:2.5px solid; }
    #pantalla-carga .corner.tr { top:32px; right:24px; border-top:2.5px solid; border-right:2.5px solid; }
    #pantalla-carga .corner.bl { bottom:32px; left:24px; border-bottom:2.5px solid; border-left:2.5px solid; }
    #pantalla-carga .corner.br { bottom:32px; right:24px; border-bottom:2.5px solid; border-right:2.5px solid; }
    #pantalla-carga .corner.tr, #pantalla-carga .corner.bl { animation-delay: 0.4s; }
    #pantalla-carga .corner.br { animation-delay: 0.8s; }
    @keyframes breathe { 0%,100%{opacity:0.25; transform:scale(1);} 50%{opacity:0.65; transform:scale(1.08);} }
    #pantalla-carga .carga-center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; z-index:1; }
    #pantalla-carga .logo-carga { width: 240px; max-width: 70vw; height: auto; }
    #pantalla-carga .carga-txt { font-family:'Inter',sans-serif; font-size:15px; color:#1A1A1A; text-align:center; margin:0; }
    #pantalla-carga .barra-wrap { width:60%; max-width:280px; padding-bottom:60px; z-index:1; }
    #pantalla-carga .barra-track { width:100%; height:4px; background:#E3E3E3; border-radius:4px; overflow:hidden; }
    #pantalla-carga .barra-fill { width:30%; height:100%; background:#8A8A8A; border-radius:4px; animation: cargar 2.2s ease-in-out infinite; }
    @keyframes cargar { 0%{width:5%; margin-left:0%;} 50%{width:55%; margin-left:20%;} 100%{width:5%; margin-left:95%;} }

    /* Instrucción flotante sobre la cámara */
    #instruccion {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 15px;
      z-index: 10;
      text-align: center;
      display: none; /* Se muestra cuando la cámara esté lista */
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

  <!-- Pantalla de carga -->
  <div id="pantalla-carga">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="carga-center">
      <!-- ÚNICO elemento que cambia por museo: el logo. Reemplazar
           assets/logo.png por el del cliente — mismo archivo que ya
           usan los D y las pantallas de Detalle. -->
      <img class="logo-carga" src="assets/logo.png" alt="Logo del museo">
      <p class="carga-txt">Cargando experiencia...</p>
    </div>
    <div class="barra-wrap"><div class="barra-track"><div class="barra-fill"></div></div></div>
  </div>

  <!-- Instrucción visible mientras busca el tracker -->
  <div id="instruccion">Apuntá la cámara a uno de los displays</div>

  <!-- ============================================================
       ESCENA AR
       
       imageTargetSrc: apunta al archivo .mind con los N trackers de
       los D de este museo. Compilarlo subiendo todas las imágenes de
       los markers físicos en el ORDEN correcto (ver más abajo, DISPLAYS).
  ============================================================ -->
  <a-scene
    mindar-image="imageTargetSrc: targets/targets.mind; autoStart: true; filterMinCF: 0.001; filterBeta: 0.01;"
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    id="escena-ar">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ===== TARGETS =====
         Se generan dinámicamente desde el array DISPLAYS más abajo —
         no hace falta agregar/quitar <a-entity> a mano: la cantidad de
         trackers la define la longitud de ese array. Ver bloque de script.
    ===== -->
    <a-entity id="targets-container"></a-entity>

  </a-scene>

  <script>
    // ===================================================
    // CONFIGURACIÓN — ÚNICO BLOQUE A EDITAR POR MUSEO (junto con el logo)
    // ---------------------------------------------------
    // Un ítem por tracker físico. El índice de la lista es el targetIndex
    // (debe coincidir con el ORDEN en que se subieron las imágenes al
    // compilador de MindAR al generar targets.mind).
    // "url" es la carpeta del D correspondiente — cada una debe tener su
    // propio index.html (el D) adentro.
    // ===================================================
    const DISPLAYS = [
      'displays/pieza-1/',   // tracker 0
      'displays/pieza-2/',   // tracker 1
      'displays/pieza-3/',   // tracker 2
      // agregar una línea por cada D nuevo, en el mismo orden que las
      // imágenes subidas al compilador de targets.mind
    ];

    // Genera un <a-entity mindar-image-target> por cada D definido arriba,
    // así no hace falta tocar el HTML de la escena al agregar/quitar piezas.
    const targetsContainer = document.querySelector('#targets-container');
    DISPLAYS.forEach((_, index) => {
      const entity = document.createElement('a-entity');
      entity.setAttribute('mindar-image-target', `targetIndex: ${index}`);
      entity.setAttribute('id', `target-${index}`);
      const plane = document.createElement('a-plane');
      plane.setAttribute('visible', 'false');
      plane.setAttribute('position', '0 0 0');
      plane.setAttribute('width', '1');
      plane.setAttribute('height', '1');
      entity.appendChild(plane);
      targetsContainer.appendChild(entity);
    });

    // ===================================================
    // DETECCIÓN: ¿LLEGAMOS ACÁ DESDE EL QR INICIAL O DESDE
    // EL BOTÓN "VOLVER AL ESCÁNER" DE UN D?
    // ---------------------------------------------------
    // Cada D es una página HTML separada. Al apretar "volver al escáner"
    // se navega de vuelta a este index.html con ?volver=1 en la URL.
    // Si detectamos ese parámetro, NO mostramos la pantalla de carga con
    // branding (el usuario ya vio esa intro una vez al escanear el QR
    // inicial; mostrarla de nuevo da la sensación incorrecta de que "hay
    // que recargar toda la experiencia" cada vez que vuelve del D).
    // ===================================================
    const vieneDeUnDisplay = new URLSearchParams(window.location.search).get('volver') === '1';

    if (vieneDeUnDisplay) {
      // Ocultamos la pantalla de carga de inmediato, sin esperar
      // ningún mínimo de tiempo ni evento de cámara.
      document.getElementById('pantalla-carga').style.display = 'none';
      document.getElementById('instruccion').style.display = 'block';
    }

    // ===================================================
    // OCULTAR PANTALLA DE CARGA (primer escaneo del QR)
    // ---------------------------------------------------
    // El evento 'loaded' de la escena AR se dispara cuando la LIBRERÍA
    // terminó de inicializarse, pero NO significa que la cámara ya esté
    // efectivamente mostrándose en pantalla todavía (falta el permiso del
    // navegador + encendido real del sensor). Si ocultamos nuestra pantalla
    // en ese momento, queda un hueco donde se ve la rueda de carga nativa
    // de la librería AR.
    //
    // Por eso esperamos al evento 'loadeddata' del <video> interno que
    // MindAR inyecta en el DOM, que SÍ indica que el primer frame de
    // cámara ya está listo para mostrarse. Como red de seguridad,
    // agregamos un timeout máximo por si ese evento no llegara a
    // disparar en algún dispositivo.
    //
    // Además, garantizamos un tiempo MÍNIMO de exhibición (branding) para
    // que la animación de carga no se sienta entrecortada en conexiones
    // rápidas. Si la cámara está lista antes de ese mínimo, esperamos a
    // que se cumpla; si tarda más, no se le suma nada extra — se oculta
    // en cuanto esté realmente lista. Todo este bloque se omite si
    // vieneDeUnDisplay es true, porque ya ocultamos la pantalla arriba.
    // ===================================================
    const TIEMPO_MINIMO_CARGA = 3000; // ms
    const inicioCarga = Date.now();
    let camaraLista = vieneDeUnDisplay; // si ya ocultamos, no hace falta procesar más

    function ocultarPantallaCarga() {
      const carga = document.getElementById('pantalla-carga');
      if (carga.dataset.oculta) return; // evita ejecutar dos veces
      carga.dataset.oculta = '1';
      carga.style.display = 'none';
      document.getElementById('instruccion').style.display = 'block';
    }

    function marcarCamaraLista() {
      if (camaraLista) return;
      camaraLista = true;
      const transcurrido = Date.now() - inicioCarga;
      const restante = TIEMPO_MINIMO_CARGA - transcurrido;
      if (restante > 0) {
        setTimeout(ocultarPantallaCarga, restante);
      } else {
        ocultarPantallaCarga();
      }
    }

    document.querySelector('#escena-ar').addEventListener('loaded', () => {
      if (vieneDeUnDisplay) return; // ya está todo ocultado, no hace falta nada más
      // Buscamos el <video> que MindAR ya debería haber insertado en el DOM
      const intentarEnganchar = () => {
        const video = document.querySelector('video');
        if (video) {
          if (video.readyState >= 2) {
            // El video ya tiene al menos un frame listo
            marcarCamaraLista();
          } else {
            video.addEventListener('loadeddata', marcarCamaraLista, { once: true });
            video.addEventListener('playing', marcarCamaraLista, { once: true });
          }
        } else {
          // El <video> todavía no existe en el DOM; reintentamos en el próximo frame
          requestAnimationFrame(intentarEnganchar);
        }
      };
      intentarEnganchar();
    });

    // Red de seguridad: si por cualquier motivo la cámara nunca dispara
    // los eventos esperados, no dejamos al usuario trabado en la pantalla
    // de carga para siempre. (No hace falta si ya venimos de un D.)
    if (!vieneDeUnDisplay) {
      setTimeout(ocultarPantallaCarga, 8000);
    }

    // Para cada D, escuchamos el evento de "tracker encontrado" y
    // redirigimos a su index.html correspondiente.
    DISPLAYS.forEach((carpeta, index) => {
      const target = document.querySelector(`#target-${index}`);
      if (!target) return;

      let yaRedirigido = false; // evita redirigir dos veces

      target.addEventListener('targetFound', () => {
        if (yaRedirigido) return;
        yaRedirigido = true;
        // Pequeña pausa para que el usuario vea la detección antes de navegar.
        setTimeout(() => {
          window.location.href = carpeta + 'index.html';
        }, 300);
      });
    });
  </script>
</body>
</html>
