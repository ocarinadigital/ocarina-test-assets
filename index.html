<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFB · Display AR (prueba 3D)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#F7F3EC; --ink:#1C2333; --gold:#9C7A3C; --gold-soft:#C7AD7B; --card:#FFFFFF; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{ height:100%; overflow:hidden; }
  body{ background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .screen{ max-width:480px; margin:0 auto; height:100vh; display:flex; flex-direction:column; position:relative; overflow:hidden; }

  header{ display:flex; align-items:flex-start; justify-content:space-between; padding:1.5vh 6vw 0 6vw; flex-shrink:0; }
  .logo{ display:flex; align-items:center; gap:2.2vw; }
  .logo-mark{ width:11vw; height:11vw; max-width:50px; max-height:50px; border:1px solid var(--ink); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-weight:600; font-size:5vw; }
  .logo-text{ font-size:2.6vw; line-height:1.45; letter-spacing:0.1em; text-transform:uppercase; font-weight:500; }
  .logo-text span{ display:block; }
  .back-link{ text-align:right; color:var(--gold); font-size:2.5vw; line-height:1.3; cursor:pointer; }
  .back-link .arrow{ font-size:4.5vw; margin:0 0 0.6vh auto; }

  .title-block{ padding:0.8vh 7vw 0 7vw; text-align:center; flex-shrink:0; }
  .badge{ display:inline-block; border:1px solid var(--gold-soft); color:var(--gold); font-size:2.5vw; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; padding:0.5vh 4vw; border-radius:100px; margin-bottom:0.8vh; }
  h1{ font-family:'Playfair Display',serif; font-weight:500; font-size:6.8vw; line-height:1.05; margin-bottom:0.6vh; }
  .rule{ width:36px; height:1px; background:var(--gold-soft); margin:0 auto 0.6vh auto; }
  .subtitle{ font-size:2.6vw; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:0.8vh; }
  .description{ font-size:2.8vw; line-height:1.4; color:rgba(28,27,25,0.75); max-width:90%; margin:0 auto; }

  .viewer-wrap{ position:relative; margin:1vh 0 0 0; height:50vh; flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  #viewer3d{ width:100%; height:100%; position:relative; }
  #viewer3d canvas{ touch-action:none; cursor:grab; display:block; }

  .loading-msg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:3vw; color:#999; text-align:center; padding:0 10vw; }
  .error-msg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:3vw; color:#b33; text-align:center; padding:0 10vw; }

  .hotspot-anchor{ position:absolute; width:1.6vw; height:1.6vw; max-width:8px; max-height:8px; border-radius:50%; background:var(--gold-soft); pointer-events:none; transform:translate(-50%,-50%); }
  .hotspot-number{ position:absolute; width:6.5vw; height:6.5vw; max-width:28px; max-height:28px; border-radius:50%; background:var(--card); border:1.4px solid var(--gold-soft); color:var(--gold); display:flex; align-items:center; justify-content:center; font-size:3.2vw; font-weight:600; cursor:pointer; transform:translate(-50%,-50%); }
  .hotspot-number::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1.4px solid var(--gold-soft);
    animation: hotspotBreathe 2.4s ease-in-out infinite;
  }
  @keyframes hotspotBreathe{
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.55); opacity: 0; }
  }
  #hotspots3d{ position:absolute; inset:0; pointer-events:none; }
  #hotspots3d .hotspot-number{ pointer-events:auto; }

  .gesture-hints{ display:flex; align-items:center; justify-content:center; gap:2.5vw; padding:0.8vh 6vw; color:var(--gold); font-size:2.5vw; flex-shrink:0; }

  .cta-detail{ margin:0 6vw 1.2vh 6vw; background:var(--card); border:1px solid var(--gold-soft); border-radius:14px; padding:1.2vh 5vw; display:flex; align-items:center; gap:4vw; text-align:left; width:calc(100% - 12vw); flex-shrink:0; font-family:'Inter',sans-serif; }
  .cta-icon{ width:9vw; height:9vw; max-width:40px; max-height:40px; border-radius:50%; border:1.4px solid var(--gold-soft); color:var(--gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:4.5vw; }
  .cta-title{ font-size:3.3vw; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--gold); margin-bottom:0.4vh; }
  .cta-sub{ font-size:3.3vw; }
  .cta-arrow{ color:var(--gold-soft); font-size:4.5vw; flex-shrink:0; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div class="screen">

  <header>
    <div class="logo">
      <div class="logo-mark">M</div>
      <div class="logo-text">
        <span>Museo</span><span>Fernández</span><span>Blanco</span>
      </div>
    </div>
    <div class="back-link">
      <div class="arrow">&#8592;</div>
      volver al<br>escáner
    </div>
  </header>

  <div class="title-block">
    <div class="badge">Pieza complementaria</div>
    <h1>Mate de plata cincelada</h1>
    <div class="rule"></div>
    <div class="subtitle">Siglo XVIII – Virreinato del Río de la Plata</div>
    <p class="description">Una pieza que no forma parte de la exhibición actual, pero complementa la historia de la época.</p>
  </div>

  <div class="viewer-wrap">
    <div id="viewer3d">
      <div class="loading-msg" id="loadingMsg">Cargando modelo 3D…</div>
    </div>
    <!-- Los hotspots ya no se posicionan a mano en HTML/CSS: se generan dinámicamente
         desde JS, anclados a coordenadas 3D reales del modelo (ver HOTSPOTS_3D abajo),
         y se reproyectan a 2D en cada frame para que viajen con la rotación y el zoom. -->
    <div id="hotspots3d"></div>
  </div>

  <div class="gesture-hints">
    <span>&#x21BB;</span><span>Desliza para rotar</span>
  </div>

  <button class="cta-detail">
    <div class="cta-icon">&#128214;</div>
    <div style="flex:1;">
      <div class="cta-title">Detalle de la pieza</div>
      <div class="cta-sub">Historia, origen y uso</div>
    </div>
    <div class="cta-arrow">&#8250;</div>
  </button>

</div>

<script>
  // Captura cualquier error de JS (incluyendo errores de carga de módulos ES,
  // que en Safari móvil pueden fallar silenciosamente sin pasar por los catch normales)
  // y lo muestra en pantalla, ya que no podemos abrir la consola del navegador fácil en un celular.
  window.addEventListener('error', (e) => {
    const el = document.getElementById('loadingMsg');
    if (el) {
      el.className = 'error-msg';
      el.innerHTML = 'Error JS: ' + (e.message || 'desconocido') + '<br><span style="font-size:0.75em;opacity:0.7;">' + (e.filename || '') + ':' + (e.lineno || '') + '</span>';
    }
  });
  window.addEventListener('unhandledrejection', (e) => {
    const el = document.getElementById('loadingMsg');
    if (el) {
      el.className = 'error-msg';
      el.innerHTML = 'Promesa rechazada: ' + (e.reason?.message || e.reason || 'desconocido');
    }
  });
</script>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

  document.getElementById('loadingMsg').textContent = 'Módulos cargados. Iniciando escena 3D…';

  // URL del modelo 3D real, servido directamente desde GitHub raw (sin pasar por jsDelivr,
  // que puede tardar o fallar en su primera petición a un repo recién creado).
  const MODEL_URL = 'https://raw.githubusercontent.com/ocarinadigital/ocarina-test-assets/main/silver_offering_bowl_c._1880_ce.glb';

  const mount = document.getElementById('viewer3d');
  const loadingMsg = document.getElementById('loadingMsg');

  const w = mount.clientWidth;
  const h = mount.clientHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
  camera.position.set(0, 0, 4);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  mount.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 1.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
  dirLight.position.set(3, 5, 4);
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0xffffff, 0.9);
  fillLight.position.set(-3, -2, -3);
  scene.add(fillLight);

  // Environment map generado por código (sin imagen externa): metales con metalness
  // alto necesitan algo que reflejar, o se ven planos/oscuros sin importar las luces.
  // RoomEnvironment da un entorno neutro tipo "habitación" que sirve para esto.
  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0xf0f0f0);
  const envLight1 = new THREE.PointLight(0xffffff, 800, 20);
  envLight1.position.set(5, 5, 5);
  envScene.add(envLight1);
  const envLight2 = new THREE.PointLight(0xffffff, 400, 20);
  envLight2.position.set(-5, 3, -5);
  envScene.add(envLight2);
  const envTexture = pmremGenerator.fromScene(envScene, 0.04).texture;
  scene.environment = envTexture;
  pmremGenerator.dispose();

  const modelGroup = new THREE.Group();
  scene.add(modelGroup);

  const loader = new GLTFLoader();
  let loadResolved = false;

  const timeoutId = setTimeout(() => {
    if (!loadResolved) {
      loadingMsg.className = 'error-msg';
      loadingMsg.innerHTML = 'El modelo está demorando demasiado o no responde.<br><span style="font-size:0.8em;opacity:0.7;">' + MODEL_URL + '</span>';
    }
  }, 15000);

  // GLTFLoader (a partir de cierta versión de three.js) dejó de soportar la extensión
  // KHR_materials_pbrSpecularGlossiness: carga la geometría perfecto, pero ignora la
  // textura difusa de ese material (se ve gris plano). Esta función la aplica a mano,
  // leyendo el JSON crudo del GLTF que el parser ya descargó y decodificó.
  async function applySpecGlossTextureManually(gltf) {
    const json = gltf.parser.json;
    if (!json.extensionsUsed || !json.extensionsUsed.includes('KHR_materials_pbrSpecularGlossiness')) {
      return; // El modelo no usa esta extensión, no hay nada que parchear.
    }

    for (let matIndex = 0; matIndex < (json.materials || []).length; matIndex++) {
      const matDef = json.materials[matIndex];
      const specGloss = matDef.extensions && matDef.extensions.KHR_materials_pbrSpecularGlossiness;
      if (!specGloss || specGloss.diffuseTexture == null) continue;

      // parser.getDependency('texture', index) descarga y decodifica la textura
      // referenciada, devolviendo un THREE.Texture ya listo para usar.
      const diffuseTex = await gltf.parser.getDependency('texture', specGloss.diffuseTexture.index);
      diffuseTex.colorSpace = THREE.SRGBColorSpace;

      // Aplicamos esta textura a todos los meshes que usan este material por índice.
      gltf.scene.traverse((node) => {
        if (node.isMesh && node.material) {
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach((mat) => {
            // GLTFLoader nombra los materiales según el glTF original, así que
            // comparamos por nombre (más confiable acá que por índice interno de three.js).
            if (mat.name === matDef.name) {
              mat.map = diffuseTex;
              mat.color.set(0xffffff); // blanco para no tintar la textura
              // GLTFLoader, al no entender esta extensión, deja metalness/roughness
              // en valores por defecto que oscurecen la textura real. Los normalizamos
              // a algo razonable para una pieza de metal con textura/grabado real
              // (no un metal espejado: la textura ya aporta el detalle visual).
              // Valores para metal pulido/brillante (plata, oro). Para metal con
              // pátina/desgaste (como la vasija de prueba anterior) usar metalness
              // ~0.3 y roughness ~0.55 en su lugar — ver bitácora de materiales.
              mat.metalness = 0.85;
              mat.roughness = 0.25;
              mat.needsUpdate = true;
            }
          });
        }
      });
    }
  }

  // ---------- HOTSPOTS ANCLADOS EN 3D ----------
  // Coordenadas en el espacio LOCAL del modelo, definidas como fracciones del
  // tamaño del modelo (0 a 1 en cada eje) en vez de unidades absolutas — así
  // funcionan igual sin importar la escala real de cada GLB que carguemos a futuro.
  // x: 0 = izquierda, 1 = derecha. y: 0 = abajo, 1 = arriba. z: 0 = atrás, 1 = adelante.
  // Cada hotspot se define por una dirección angular desde el centro del modelo
  // (azimuth: ángulo horizontal en grados, 0=adelante, 90=derecha, etc.;
  // heightFraction: 0=base del modelo, 1=tope del modelo) en vez de coordenadas
  // de bounding box — esto permite anclar el punto a la SUPERFICIE REAL de la
  // pieza vía raycasting, en vez de caer "en el aire" dentro de una caja rectangular
  // que no sigue la forma curva del objeto.
  const HOTSPOTS_3D = [
    { id: 'hotspot-1', azimuthDeg: 35,  heightFraction: 0.75, label: 'Borde superior' },
    { id: 'hotspot-2', azimuthDeg: 110, heightFraction: 0.45, label: 'Cuerpo central' },
    { id: 'hotspot-3', azimuthDeg: 200, heightFraction: 0.1,  label: 'Base' },
  ];

  const hotspotContainer = document.getElementById('hotspots3d');
  const hotspotElements = {}; // { numberEl, anchorEl, lineEl }
  let modelBoxForHotspots = null; // se completa una vez que el modelo carga (ver loader.load abajo)
  let modelCenterForHotspots = null;

  // SVG compartido para todas las líneas de los hotspots — un solo elemento
  // que cubre todo el viewer-wrap, con una línea por hotspot dentro.
  const hotspotSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  hotspotSvg.setAttribute('style', 'position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible;');
  hotspotContainer.appendChild(hotspotSvg);

  function createHotspotElements() {
    HOTSPOTS_3D.forEach((h, idx) => {
      // Línea recta del punto de anclaje al número.
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('stroke', 'var(--gold-soft)');
      line.setAttribute('stroke-width', '1.5');
      hotspotSvg.appendChild(line);

      // Punto esférico en la superficie del modelo (mismo color que la línea).
      const anchor = document.createElement('div');
      anchor.className = 'hotspot-anchor';
      hotspotContainer.appendChild(anchor);

      // Círculo numerado al final de la línea — siempre visible, nunca se oculta.
      const number = document.createElement('div');
      number.className = 'hotspot-number';
      number.textContent = String(idx + 1);
      number.title = h.label;
      hotspotContainer.appendChild(number);

      hotspotElements[h.id] = { line, anchor, number };
    });
  }
  createHotspotElements();

  loader.load(
    MODEL_URL,
    async (gltf) => {
      loadResolved = true;
      clearTimeout(timeoutId);
      loadingMsg.remove();
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      // Calculamos la escala para que el modelo ocupe exactamente el 70% del ancho
      // visible del visor a la distancia fija de la cámara (ya no hay zoom, así que
      // esta distancia es constante). Usamos la fórmula del frustum de una cámara
      // perspectiva: ancho visible a distancia d = 2 * d * tan(fov/2) * aspect.
      const TARGET_WIDTH_FRACTION = 0.7;
      const cameraDistance = camera.position.z;
      const vFov = (camera.fov * Math.PI) / 180;
      const visibleHeightAtDistance = 2 * Math.tan(vFov / 2) * cameraDistance;
      const visibleWidthAtDistance = visibleHeightAtDistance * camera.aspect;

      // Usamos el diámetro horizontal real del modelo (X, ya que es el eje que
      // domina el "ancho" visual al rotar sobre Y) para calcular qué escala lo
      // hace ocupar el 70% de ese ancho visible.
      const horizontalExtent = Math.max(size.x, size.z); // cubre rotación en cualquier orientación
      const scale = (visibleWidthAtDistance * TARGET_WIDTH_FRACTION) / horizontalExtent;

      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));
      modelGroup.add(model);

      // Recalculamos el bounding box ya con la escala y posición finales aplicadas,
      // en el espacio local de modelGroup — este es el que usan los hotspots para
      // ubicarse de forma relativa (fx/fy/fz de 0 a 1) sin importar la escala original del GLB.
      modelBoxForHotspots = new THREE.Box3().setFromObject(model);
      modelCenterForHotspots = modelBoxForHotspots.getCenter(new THREE.Vector3());
      computeHotspotAnchors(model);

      try {
        await applySpecGlossTextureManually(gltf);
      } catch (e) {
        console.warn('No se pudo aplicar la textura manualmente:', e);
      }
    },
    (progress) => {
      if (progress.total) {
        const pct = Math.round((progress.loaded / progress.total) * 100);
        loadingMsg.textContent = `Cargando modelo 3D… ${pct}%`;
      }
    },
    (err) => {
      loadResolved = true;
      clearTimeout(timeoutId);
      console.error('Error cargando GLB:', err);
      loadingMsg.className = 'error-msg';
      loadingMsg.innerHTML = 'No se pudo cargar el modelo 3D.<br><span style="font-size:0.8em;opacity:0.7;">' + MODEL_URL + '</span>';
    }
  );

  // Rotación por arrastre (mouse y táctil)
  let isDragging = false;
  let prevX = 0, prevY = 0;
  let rotY = 0, rotX = 0;

  function onDown(x, y) { isDragging = true; prevX = x; prevY = y; }
  function onMove(x, y) {
    if (!isDragging) return;
    const dx = x - prevX;
    const dy = y - prevY;
    rotY += dx * 0.01;
    rotX += dy * 0.01;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    modelGroup.rotation.y = rotY;
    modelGroup.rotation.x = rotX;
    prevX = x; prevY = y;
  }
  function onUp() { isDragging = false; }

  renderer.domElement.addEventListener('mousedown', (e) => onDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onUp);

  renderer.domElement.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) onDown(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  renderer.domElement.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1) onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  renderer.domElement.addEventListener('touchend', onUp);

  // Zoom eliminado a propósito: el modelo ya ocupa un porcentaje fijo y considerable
  // de la pantalla desde el principio (es el protagonista), así que no hace falta
  // acercarlo más. Esto también evita el desplazamiento desprolijo de los hotspots
  // hacia afuera que ocurría al hacer zoom, y reduce código/superficie de bugs.

  // ---------- HOTSPOTS ANCLADOS EN 3D (declaración movida arriba, antes de loader.load,
  // para que modelBoxForHotspots exista cuando el callback de carga la usa) ----------

  // Proyecta cada hotspot de coordenadas 3D (relativas al modelo) a coordenadas
  // 2D de pantalla, considerando la rotación y el zoom actuales de la cámara.
  // Esto es lo que hace que "viajen con la pieza" en vez de quedar fijos en pantalla.
  const occlusionRaycaster = new THREE.Raycaster();

  // Distancia (en unidades del modelo, ya normalizado a ~2.2 de tamaño máximo)
  // que el número se aleja del punto de anclaje en la superficie. Suficiente
  // para despegarse visualmente de la pieza sin alejarse demasiado.
  const HOTSPOT_LINE_LENGTH = 0.55;

  // Margen de seguridad en píxeles para que el número nunca quede pegado
  // al borde exacto del visor — siempre dentro de la pantalla con este respiro.
  const SCREEN_CLAMP_MARGIN = 18;

  function projectToScreen(vec3) {
    const halfW = mount.clientWidth / 2;
    const halfH = mount.clientHeight / 2;
    const p = vec3.clone().project(camera);
    return {
      x: p.x * halfW + halfW,
      y: -p.y * halfH + halfH,
      behindCamera: p.z > 1,
    };
  }

  // Anclajes reales calculados UNA VEZ cuando el modelo carga (no en cada frame:
  // la geometría local no cambia, solo rota — recalcular el raycast en cada frame
  // sería trabajo innecesario). Se completan en computeHotspotAnchors(), llamada
  // desde loader.load() después de centrar/escalar el modelo.
  const hotspotAnchorsLocal = {}; // { id: THREE.Vector3 en espacio local de modelGroup }

  function computeHotspotAnchors(model) {
    const anchorRaycaster = new THREE.Raycaster();
    const box = new THREE.Box3().setFromObject(model);
    const sphere = new THREE.Sphere();
    box.getBoundingSphere(sphere);
    // Radio de partida para el rayo: bien afuera del modelo, para garantizar
    // que el rayo hacia el centro siempre atraviese la superficie real.
    const rayOriginDistance = sphere.radius * 2.5;

    HOTSPOTS_3D.forEach((h) => {
      const azimuthRad = (h.azimuthDeg * Math.PI) / 180;
      const y = sphere.center.y - sphere.radius + sphere.radius * 2 * h.heightFraction;

      // Punto de partida del rayo: bien afuera del modelo, en la dirección angular
      // indicada, a la altura deseada.
      const origin = new THREE.Vector3(
        sphere.center.x + Math.sin(azimuthRad) * rayOriginDistance,
        y,
        sphere.center.z + Math.cos(azimuthRad) * rayOriginDistance
      );
      const direction = sphere.center.clone().setY(y).sub(origin).normalize();

      anchorRaycaster.set(origin, direction);
      const intersects = anchorRaycaster.intersectObject(model, true);

      if (intersects.length > 0) {
        // Primer punto de impacto = superficie real exterior del modelo, en
        // coordenadas LOCALES de modelGroup (donde vive el resto de la lógica).
        hotspotAnchorsLocal[h.id] = model.parent.worldToLocal(intersects[0].point.clone());
      } else {
        // Fallback si el rayo no pega contra nada (geometría con huecos, etc.):
        // usamos un punto en la superficie de la esfera envolvente, mejor que nada.
        const fallback = sphere.center.clone().add(
          new THREE.Vector3(Math.sin(azimuthRad), 0, Math.cos(azimuthRad)).multiplyScalar(sphere.radius)
        );
        fallback.y = y;
        hotspotAnchorsLocal[h.id] = fallback;
      }
    });
  }

  function updateHotspotPositions() {
    if (!modelCenterForHotspots) return;
    const center = modelCenterForHotspots;

    HOTSPOTS_3D.forEach((h) => {
      const localAnchor = hotspotAnchorsLocal[h.id];
      if (!localAnchor) return;

      // Dirección "hacia afuera": desde el centro del modelo hasta el punto de
      // anclaje real en la superficie — la línea sale en línea recta desde ahí.
      const outwardDir = localAnchor.clone().sub(center).normalize();
      const localNumberPos = localAnchor.clone().add(outwardDir.multiplyScalar(HOTSPOT_LINE_LENGTH));

      // Aplicamos la misma rotación que tiene el modelo actualmente.
      const worldAnchor = localAnchor.clone().applyEuler(modelGroup.rotation);
      const worldNumber = localNumberPos.clone().applyEuler(modelGroup.rotation);

      const anchorScreen = projectToScreen(worldAnchor);
      const numberScreen = projectToScreen(worldNumber);

      const els = hotspotElements[h.id];
      if (!els) return;

      const w = mount.clientWidth;
      const hgt = mount.clientHeight;
      const clampedX = Math.max(SCREEN_CLAMP_MARGIN, Math.min(w - SCREEN_CLAMP_MARGIN, numberScreen.x));
      const clampedY = Math.max(SCREEN_CLAMP_MARGIN, Math.min(hgt - SCREEN_CLAMP_MARGIN, numberScreen.y));

      els.number.style.left = `${clampedX}px`;
      els.number.style.top = `${clampedY}px`;

      let anchorOccluded = anchorScreen.behindCamera;
      if (!anchorOccluded) {
        const direction = worldAnchor.clone().sub(camera.position).normalize();
        occlusionRaycaster.set(camera.position, direction);
        const distanceToAnchor = camera.position.distanceTo(worldAnchor);
        const intersects = occlusionRaycaster.intersectObject(modelGroup, true);
        if (intersects.length > 0 && intersects[0].distance < distanceToAnchor - 0.05) {
          anchorOccluded = true;
        }
      }

      if (anchorOccluded) {
        els.anchor.style.display = 'none';
        els.line.style.display = 'none';
      } else {
        els.anchor.style.display = 'block';
        els.line.style.display = 'block';
        els.anchor.style.left = `${anchorScreen.x}px`;
        els.anchor.style.top = `${anchorScreen.y}px`;

        els.line.setAttribute('x1', anchorScreen.x);
        els.line.setAttribute('y1', anchorScreen.y);
        els.line.setAttribute('x2', clampedX);
        els.line.setAttribute('y2', clampedY);
      }
    });
  }


  function animate() {
    requestAnimationFrame(animate);
    updateHotspotPositions();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    const newW = mount.clientWidth;
    const newH = mount.clientHeight;
    camera.aspect = newW / newH;
    camera.updateProjectionMatrix();
    renderer.setSize(newW, newH);
  });
</script>

</body>
</html>
